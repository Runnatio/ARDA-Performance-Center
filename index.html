<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDA Performance Center - Live Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .start-info {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .last-updated {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-bottom: 25px;
            font-style: italic;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.75em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        
        .stat-unit {
            font-size: 0.6em;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .performance-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        .performance-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        .performance-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }
        
        .performance-table tr:hover {
            background: #f8f9fa;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .on-pace {
            color: #27ae60;
            font-weight: bold;
        }
        
        .behind-pace {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .ahead-pace {
            color: #27ae60;
            font-weight: bold;
        }
        
        .warning-section {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #856404;
        }
        
        .sleep-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #f0f4ff;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .sleep-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .sleep-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }
        
        .sleep-table tr:hover {
            background: #e8ecff;
        }
        
        .sleep-table tr:last-child td {
            border-bottom: none;
        }
        
        .sleep-highlight {
            background: #d4edda;
            font-weight: bold;
            color: #155724;
        }
        
        .section-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .loading {
            text-align: center;
            color: #999;
            font-size: 1.1em;
            padding: 40px 20px;
        }
        
        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .stat-value {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃 ARDA Performance Center</h1>
        <div class="start-info">
            <strong>Start Time:</strong> May 5, 2026 @ 20:07:55 CEST<br>
            <strong>Elapsed Time (Auto-calculated):</strong> <span id="autoElapsedTime">0.00</span> hours
        </div>
        
        <div class="last-updated">
            Last Updated: <span id="lastUpdated">Never</span>
        </div>
        
        <div id="errorBox"></div>
        
        <div id="statsContainer" class="loading">
            Loading tracker data...
        </div>
    </div>
    
    <script>
        const TOTAL_DISTANCE = 600; // km
        const TOTAL_TIME = 96; // hours
        const TARGET_PACE_MIN_KM = 9.6; // min/km (9 min 36 sec per km)
        
        // Start time: May 5, 2026 @ 20:07:55 CEST
        const START_TIME = new Date('2026-05-05T20:07:55+02:00');
        
        // URL to fetch covered distance from backend
        const BACKEND_URL = 'https://raw.githubusercontent.com/Runnatio/ARDA-Performance-Center/main/distance.json';
        
        let lastUpdateTime = null;
        
        function getElapsedTime() {
            const now = new Date();
            const diff = now - START_TIME;
            const hours = diff / (1000 * 60 * 60);
            return hours;
        }
        
        function kmhToMinKm(kmh) {
            if (kmh <= 0) return 0;
            return 60 / kmh;
        }
        
        function minKmToKmh(minKm) {
            if (minKm <= 0) return 0;
            return 60 / minKm;
        }
        
        function formatPace(minKm) {
            if (minKm <= 0) return '0:00';
            const minutes = Math.floor(minKm);
            const seconds = Math.round((minKm - minutes) * 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function formatTime(hours) {
            const h = Math.floor(hours);
            const m = Math.floor((hours - h) * 60);
            const s = Math.floor(((hours - h) * 60 - m) * 60);
            return `${h}h ${m}m ${s}s`;
        }
        
        function updateElapsedTimeDisplay() {
            const elapsedTime = getElapsedTime();
            document.getElementById('autoElapsedTime').textContent = elapsedTime.toFixed(2);
        }
        
        function updateLastUpdated() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            lastUpdateTime = `${hours}:${minutes}:${seconds}`;
            document.getElementById('lastUpdated').textContent = lastUpdateTime;
        }
        
        async function fetchCoveredDistance() {
            try {
                // Add cache-busting query parameter with current timestamp
                const timestamp = new Date().getTime();
                const url = `${BACKEND_URL}?t=${timestamp}`;
                
                const response = await fetch(url, {
                    cache: 'no-store',
                    headers: {
                        'Pragma': 'no-cache',
                        'Cache-Control': 'no-cache, no-store, must-revalidate'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                return data.distance;
            } catch (error) {
                console.error('Error fetching distance:', error);
                return null;
            }
        }
        
        function renderStats(coveredDistance) {
            const elapsedTime = getElapsedTime();
            
            // Validate
            if (coveredDistance < 0 || coveredDistance > TOTAL_DISTANCE || elapsedTime > TOTAL_TIME) {
                let errorMsg = '';
                if (coveredDistance < 0) errorMsg = 'Invalid distance (negative)';
                else if (coveredDistance > TOTAL_DISTANCE) errorMsg = `Distance exceeds 600km (${coveredDistance}km)`;
                else if (elapsedTime > TOTAL_TIME) errorMsg = 'Time limit exceeded! The race is over.';
                
                const errorBox = document.getElementById('errorBox');
                errorBox.innerHTML = `<div class="error">⚠️ ${errorMsg}</div>`;
                return;
            } else {
                document.getElementById('errorBox').innerHTML = '';
            }
            
            // Calculations
            const currentPaceKmh = elapsedTime > 0 ? coveredDistance / elapsedTime : 0;
            const currentPaceMinKm = elapsedTime > 0 ? kmhToMinKm(currentPaceKmh) : 0;
            
            const timeRemaining = TOTAL_TIME - elapsedTime;
            const distanceRemaining = TOTAL_DISTANCE - coveredDistance;
            
            const neededPaceKmh = timeRemaining > 0 ? distanceRemaining / timeRemaining : 0;
            const neededPaceMinKm = timeRemaining > 0 ? kmhToMinKm(neededPaceKmh) : 0;
            
            const paceDifference = neededPaceMinKm - TARGET_PACE_MIN_KM;
            const progressPercent = (coveredDistance / TOTAL_DISTANCE) * 100;
            
            // Determine pace status
            let paceStatus = 'On Target';
            let paceClass = '—';
            
            if (neededPaceMinKm > TARGET_PACE_MIN_KM * 1.05) {
                paceStatus = 'Behind Pace - Need to Speed Up!';
                paceClass = 'behind-pace';
            } else if (neededPaceMinKm < TARGET_PACE_MIN_KM * 0.95) {
                paceStatus = 'Ahead of Pace - Good Job!';
                paceClass = 'ahead-pace';
            } else {
                paceStatus = 'On Target';
                paceClass = 'on-pace';
            }
            
            // Generate HTML
            let sleepTableHTML = '';
            for (let pace = 7; pace <= 11; pace += 1) {
                const timeToComplete = (distanceRemaining * pace) / 60;
                const sleepTime = timeRemaining - timeToComplete;
                const isHighlight = pace === Math.round(neededPaceMinKm) ? 'sleep-highlight' : '';
                
                sleepTableHTML += `
                    <tr class="${isHighlight}">
                        <td>${pace.toFixed(0)}:00</td>
                        <td>${formatTime(timeToComplete)}</td>
                        <td>${sleepTime > 0 ? formatTime(sleepTime) : 'N/A (overtime)'}</td>
                    </tr>
                `;
            }
            
            let warningHTML = '';
            if (coveredDistance >= TOTAL_DISTANCE) {
                warningHTML = `<div class="warning-section" style="background: #d4edda; border-left-color: #28a745; color: #155724;">✓ FINISHED! Total time: ${formatTime(elapsedTime)}</div>`;
            } else if (elapsedTime >= TOTAL_TIME) {
                warningHTML = `<div class="warning-section" style="background: #f8d7da; border-left-color: #dc3545; color: #721c24;">✗ TIME'S UP! Distance completed: ${coveredDistance.toFixed(1)} km</div>`;
            } else if (neededPaceMinKm > TARGET_PACE_MIN_KM * 1.1) {
                warningHTML = `<div class="warning-section">⚠️ WARNING: Need to increase pace to ${formatPace(neededPaceMinKm)} min/km to finish on time!</div>`;
            }
            
            const distanceStatus = coveredDistance >= (minKmToKmh(TARGET_PACE_MIN_KM) * elapsedTime) ? 'Ahead' : coveredDistance <= (minKmToKmh(TARGET_PACE_MIN_KM) * elapsedTime) ? 'Behind' : 'On Time';
            const timeStatus = elapsedTime <= (coveredDistance / minKmToKmh(TARGET_PACE_MIN_KM)) ? 'Ahead' : 'Behind';
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Current Pace</div>
                        <div class="stat-value">${formatPace(currentPaceMinKm)}</div>
                        <div class="stat-unit">min/km</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Required Pace</div>
                        <div class="stat-value">${formatPace(neededPaceMinKm)}</div>
                        <div class="stat-unit">min/km</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Time Remaining</div>
                        <div class="stat-value">${timeRemaining.toFixed(2)}</div>
                        <div class="stat-unit">hours</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Distance Remaining</div>
                        <div class="stat-value">${distanceRemaining.toFixed(1)}</div>
                        <div class="stat-unit">km</div>
                    </div>
                </div>
                
                <table class="performance-table">
                    <thead>
                        <tr>
                            <th>Metric</th>
                            <th>Value</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Total Distance Goal</td>
                            <td>600.0 km</td>
                            <td>—</td>
                        </tr>
                        <tr>
                            <td>Total Time Limit</td>
                            <td>96 hours</td>
                            <td>—</td>
                        </tr>
                        <tr>
                            <td>Target Average Pace</td>
                            <td>9:36 min/km</td>
                            <td>—</td>
                        </tr>
                        <tr>
                            <td>Distance Covered</td>
                            <td>${coveredDistance.toFixed(1)} km</td>
                            <td>${distanceStatus}</td>
                        </tr>
                        <tr>
                            <td>Time Used</td>
                            <td>${elapsedTime.toFixed(2)} h</td>
                            <td>${timeStatus}</td>
                        </tr>
                        <tr>
                            <td>Needed Pace for Remaining Distance</td>
                            <td>${formatPace(neededPaceMinKm)} min/km</td>
                            <td class="${paceClass}">${paceStatus}</td>
                        </tr>
                        <tr>
                            <td>Pace Difference</td>
                            <td>${(paceDifference >= 0 ? '+' : '')}${formatPace(Math.abs(paceDifference))} min/km</td>
                            <td>—</td>
                        </tr>
                    </tbody>
                </table>
                
                <div style="margin-bottom: 20px;">
                    <strong>Progress: </strong><span>${progressPercent.toFixed(1)}%</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercent}%"></div>
                    </div>
                </div>
                
                ${warningHTML}
                
                <div class="section-title">⏰ Sleep Time Calculator</div>
                <p style="color: #666; margin-bottom: 15px;">How much sleep time remains based on different pace targets:</p>
                
                <table class="sleep-table">
                    <thead>
                        <tr>
                            <th>Target Pace (min/km)</th>
                            <th>Time to Complete Remaining Distance</th>
                            <th>Sleep Time Remaining</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sleepTableHTML}
                    </tbody>
                </table>
            `;
            
            document.getElementById('statsContainer').innerHTML = html;
        }
        
        async function loadAndDisplayStats() {
            const distance = await fetchCoveredDistance();
            if (distance !== null) {
                updateLastUpdated();
                renderStats(distance);
            } else {
                document.getElementById('statsContainer').innerHTML = `
                    <div class="error">
                        ⚠️ Unable to load distance data from backend. Please check if <code>distance.json</code> exists in the repository.
                    </div>
                `;
            }
        }
        
        // Update elapsed time every second
        setInterval(updateElapsedTimeDisplay, 1000);
        
        // Load and display stats every 5 seconds
        setInterval(loadAndDisplayStats, 5000);
        
        // Initial load
        window.addEventListener('load', () => {
            updateElapsedTimeDisplay();
            loadAndDisplayStats();
        });
    </script>
</body>
</html>
