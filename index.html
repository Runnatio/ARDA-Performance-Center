<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDA Performance Center - Live Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .start-info {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .last-updated {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-bottom: 25px;
            font-style: italic;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.75em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        
        .stat-unit {
            font-size: 0.6em;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .performance-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        .performance-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        .performance-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }
        
        .performance-table tr:hover {
            background: #f8f9fa;
        }
        
        .progress-section {
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .progress-section h3 {
            font-size: 1em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .progress-bar {
            width: 100%;
            height: 15px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5px;
            font-size: 0.7em;
            color: white;
            font-weight: bold;
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
        
        .pace-comparison-box {
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        
        .pace-comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .pace-item {
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        
        .pace-item-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .pace-item-value {
            font-size: 1.8em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #333;
        }
        
        .distance-progress {
            border-left: 4px solid #3498db;
        }
        
        .time-progress {
            border-left: 4px solid #e74c3c;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .status-ahead {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }
        
        .status-behind {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        
        .status-on-pace {
            background: #cfe9ff;
            color: #004085;
            border: 2px solid #0066cc;
        }
        
        .on-pace {
            color: #27ae60;
            font-weight: bold;
        }
        
        .behind-pace {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .ahead-pace {
            color: #27ae60;
            font-weight: bold;
        }
        
        .warning-section {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #856404;
        }
        
        .sleep-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #f0f4ff;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .sleep-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .sleep-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }
        
        .sleep-table tr:hover {
            background: #e8ecff;
        }
        
        .sleep-table tr:last-child td {
            border-bottom: none;
        }
        
        .sleep-highlight {
            background: #d4edda;
            font-weight: bold;
            color: #155724;
        }
        
        .section-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .loading {
            text-align: center;
            color: #999;
            font-size: 1.1em;
            padding: 40px 20px;
        }
        
        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .pace-comparison-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .stat-value {
                font-size: 1.4em;
            }
            
            .pace-comparison-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃 ARDA Performance Center</h1>
        <div class="start-info">
            <strong>Start Time:</strong> May 5, 2026 @ 20:07:55 CEST<br>
            <strong>Elapsed Time (Auto-calculated):</strong> <span id="autoElapsedTime">0.00</span> hours
        </div>
        
         <div class="last-updated">
             Last Updated: <span id="lastUpdated">Never</span>
         </div>
        
        <div id="errorBox"></div>
        
        <div id="statsContainer" class="loading">
            Loading tracker data...
        </div>
    </div>
    
    <script>
        const TOTAL_DISTANCE = 600; // km
        const TOTAL_TIME = 96; // hours
        const TARGET_PACE_MIN_KM = 9.6; // min/km (9 min 36 sec per km)
        
        // Start time: May 5, 2026 @ 20:07:55 CEST
        const START_TIME = new Date('2026-05-05T20:07:55+02:00');
        
        // URL to fetch covered distance from backend
        const BACKEND_URL = 'https://api.jsonbin.io/v3/b/69fc9233adc21f119a685c4c/latest';
        
        
        
        function getElapsedTime() {
            const now = new Date();
            const diff = now - START_TIME;
            const hours = diff / (1000 * 60 * 60);
            return hours;
        }
        
        function kmhToMinKm(kmh) {
            if (kmh <= 0) return 0;
            return 60 / kmh;
        }
        
        function minKmToKmh(minKm) {
            if (minKm <= 0) return 0;
            return 60 / minKm;
        }
        
        function formatPace(minKm) {
            if (minKm <= 0) return '0:00';
            const minutes = Math.floor(minKm);
            const seconds = Math.round((minKm - minutes) * 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function formatTime(hours) {
            const h = Math.floor(hours);
            const m = Math.floor((hours - h) * 60);
            const s = Math.floor(((hours - h) * 60 - m) * 60);
            return `${h}h ${m}m ${s}s`;
        }
        
        function formatTimeHHMM(hours) {
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }
        
        function updateElapsedTimeDisplay() {
            const elapsedTime = getElapsedTime();
            document.getElementById('autoElapsedTime').textContent = elapsedTime.toFixed(2);
        }
        
        function updateLastUpdated(timestamp) {

    const date = new Date(timestamp);

    const formatted = new Intl.DateTimeFormat('de-CH', {
        timeZone: 'Europe/Zurich',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        timeZoneName: 'short'
    }).format(date);

    document.getElementById('lastUpdated').textContent = formatted;
}
        
        async function fetchCoveredDistance() {

    try {

        const response = await fetch(BACKEND_URL, {
            cache: 'no-store'
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        console.log('JSONBin response:', data);

        // Validate structure
        if (
            !data.record ||
            typeof data.record.distance !== 'number'
        ) {
            throw new Error('Distance field missing or invalid');
        }

        // Use backend update timestamp
        const updatedAt =
            data.record.updatedAt ||
            data.metadata.updatedAt;

        updateLastUpdated(updatedAt);

        return data.record.distance;

    } catch (error) {

        console.error('Fetch error:', error);

        return null;
    }
}
        
        function renderStats(coveredDistance) {
            const elapsedTime = getElapsedTime();
            
            // Validate
            if (coveredDistance < 0 || coveredDistance > TOTAL_DISTANCE || elapsedTime > TOTAL_TIME) {
                let errorMsg = '';
                if (coveredDistance < 0) errorMsg = 'Invalid distance (negative)';
                else if (coveredDistance > TOTAL_DISTANCE) errorMsg = `Distance exceeds 600km (${coveredDistance}km)`;
                else if (elapsedTime > TOTAL_TIME) errorMsg = 'Time limit exceeded! The race is over.';
                
                const errorBox = document.getElementById('errorBox');
                errorBox.innerHTML = `<div class="error">⚠️ ${errorMsg}</div>`;
                return;
            } else {
                document.getElementById('errorBox').innerHTML = '';
            }
            
            // Calculations
            const currentPaceKmh = elapsedTime > 0 ? coveredDistance / elapsedTime : 0;
            const currentPaceMinKm = elapsedTime > 0 ? kmhToMinKm(currentPaceKmh) : 0;
            
            const timeRemaining = TOTAL_TIME - elapsedTime;
            const distanceRemaining = TOTAL_DISTANCE - coveredDistance;
            
            const neededPaceKmh = timeRemaining > 0 ? distanceRemaining / timeRemaining : 0;
            const neededPaceMinKm = timeRemaining > 0 ? kmhToMinKm(neededPaceKmh) : 0;
            
            const paceDifference = neededPaceMinKm - TARGET_PACE_MIN_KM;
            const progressPercent = (coveredDistance / TOTAL_DISTANCE) * 100;
            const timeProgressPercent = (elapsedTime / TOTAL_TIME) * 100;
            
            // Calculate if runner is ahead or behind
            const expectedDistanceAtPace = minKmToKmh(TARGET_PACE_MIN_KM) * elapsedTime;
            const distanceDelta = coveredDistance - expectedDistanceAtPace;
            
            // Determine pace status
            let paceStatus = 'On Target';
            let paceClass = '—';
            let statusBadgeClass = 'status-on-pace';
            let statusIcon = '✓';
            
            if (neededPaceMinKm < TARGET_PACE_MIN_KM * 0.95) {
                paceStatus = 'Behind Pace - Need to Speed Up!';
                paceClass = 'behind-pace';
                statusBadgeClass = 'status-behind';
                statusIcon = '⚠️';
            } else if (neededPaceMinKm > TARGET_PACE_MIN_KM * 1.05) {
                paceStatus = 'Ahead of Pace - Good Job!';
                paceClass = 'ahead-pace';
                statusBadgeClass = 'status-ahead';
                statusIcon = '🎉';
            } else {
                paceStatus = 'On Target';
                paceClass = 'on-pace';
                statusBadgeClass = 'status-on-pace';
                statusIcon = '✓';
            }
            
            // Generate HTML
            let sleepTableHTML = '';
            for (let pace = 7; pace <= 11; pace += 1) {
                const timeToComplete = (distanceRemaining * pace) / 60;
                const sleepTime = timeRemaining - timeToComplete;
                const isHighlight = pace === Math.round(neededPaceMinKm) ? 'sleep-highlight' : '';
                
                sleepTableHTML += `
                    <tr class="${isHighlight}">
                        <td>${pace.toFixed(0)}:00</td>
                        <td>${formatTime(timeToComplete)}</td>
                        <td>${sleepTime > 0 ? formatTime(sleepTime) : 'N/A (overtime)'}</td>
                    </tr>
                `;
            }
            
            let warningHTML = '';
            if (coveredDistance >= TOTAL_DISTANCE) {
                warningHTML = `<div class="warning-section" style="background: #d4edda; border-left-color: #28a745; color: #155724;">✓ FINISHED! Total time: ${formatTime(elapsedTime)}</div>`;
            } else if (elapsedTime >= TOTAL_TIME) {
                warningHTML = `<div class="warning-section" style="background: #f8d7da; border-left-color: #dc3545; color: #721c24;">✗ TIME'S UP! Distance completed: ${coveredDistance.toFixed(1)} km</div>`;
            } else if (neededPaceMinKm > TARGET_PACE_MIN_KM * 1.1) {
                warningHTML = `<div class="warning-section">⚠️ WARNING: Need to increase pace to ${formatPace(neededPaceMinKm)} min/km to finish on time!</div>`;
            }
            
            const distanceStatus = coveredDistance >= (minKmToKmh(TARGET_PACE_MIN_KM) * elapsedTime) ? 'Ahead' : coveredDistance <= (minKmToKmh(TARGET_PACE_MIN_KM) * elapsedTime) ? 'Behind' : 'On Time';
            const timeStatus = elapsedTime <= (coveredDistance / minKmToKmh(TARGET_PACE_MIN_KM)) ? 'Ahead' : 'Behind';
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Current Pace</div>
                        <div class="stat-value">${formatPace(currentPaceMinKm)}</div>
                        <div class="stat-unit">min/km</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Required Pace</div>
                        <div class="stat-value">${formatPace(neededPaceMinKm)}</div>
                        <div class="stat-unit">min/km</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Time Remaining</div>
                        <div class="stat-value">${timeRemaining.toFixed(2)}</div>
                        <div class="stat-unit">hours</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Distance Remaining</div>
                        <div class="stat-value">${distanceRemaining.toFixed(1)}</div>
                        <div class="stat-unit">km</div>
                    </div>
                </div>
                
                <div class="pace-comparison-box">
                    <h3>⚡ Pace Status</h3>
                    <div class="pace-comparison-grid">
                        <div class="pace-item" style="background: #f0f4ff;">
                            <div class="pace-item-label">Expected Distance</div>
                            <div class="pace-item-value">${expectedDistanceAtPace.toFixed(1)}</div>
                            <div class="pace-item-label" style="font-size: 0.7em;">at target pace</div>
                        </div>
                        <div class="pace-item" style="background: #f9f9f9;">
                            <div class="pace-item-label">Actual Distance</div>
                            <div class="pace-item-value">${coveredDistance.toFixed(1)}</div>
                            <div class="pace-item-label" style="font-size: 0.7em;">km</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <div style="font-size: 1.1em; font-weight: bold; color: ${distanceDelta >= 0 ? '#28a745' : '#dc3545'};">
                            ${distanceDelta >= 0 ? '+' : ''}${distanceDelta.toFixed(1)} km ${distanceDelta >= 0 ? 'AHEAD' : 'BEHIND'}
                        </div>
                        <span class="status-badge ${statusBadgeClass}">${statusIcon} ${paceStatus}</span>
                    </div>
                </div>
                
                <div class="progress-section distance-progress">
                    <h3>📍 Distance Progress</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercent}%">${progressPercent.toFixed(1)}%</div>
                    </div>
                    <div class="progress-labels">
                        <span>${coveredDistance.toFixed(1)} km</span>
                        <span>${TOTAL_DISTANCE} km</span>
                    </div>
                </div>
                
                <div class="progress-section time-progress">
                    <h3>⏱️ Time Progress</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${timeProgressPercent}%">${timeProgressPercent.toFixed(1)}%</div>
                    </div>
                    <div class="progress-labels">
                        <span>${formatTimeHHMM(elapsedTime)}</span>
                        <span>${TOTAL_TIME} hours</span>
                    </div>
                </div>
                
                <table class="performance-table">
                    <thead>
                        <tr>
                            <th>Metric</th>
                            <th>Value</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Total Distance Goal</td>
                            <td>600.0 km</td>
                            <td>—</td>
                        </tr>
                        <tr>
                            <td>Total Time Limit</td>
                            <td>96 hours</td>
                            <td>—</td>
                        </tr>
                        <tr>
                            <td>Target Average Pace</td>
                            <td>9:36 min/km</td>
                            <td>—</td>
                        </tr>
                        <tr>
                            <td>Distance Covered</td>
                            <td>${coveredDistance.toFixed(1)} km</td>
                            <td>${distanceStatus}</td>
                        </tr>
                        <tr>
                            <td>Time Used</td>
                            <td>${formatTimeHHMM(elapsedTime)}</td>
                            <td>${timeStatus}</td>
                        </tr>
                        <tr>
                            <td>Needed Pace for Remaining Distance</td>
                            <td>${formatPace(neededPaceMinKm)} min/km</td>
                            <td class="${paceClass}">${paceStatus}</td>
                        </tr>
                        <tr>
                            <td>Pace Difference</td>
                            <td>${(paceDifference >= 0 ? '+' : '')}${formatPace(Math.abs(paceDifference))} min/km</td>
                            <td>—</td>
                        </tr>
                    </tbody>
                </table>
                
                ${warningHTML}
                
                <div class="section-title">⏰ Sleep Time Calculator</div>
                <p style="color: #666; margin-bottom: 15px;">How much sleep time remains based on different pace targets:</p>
                
                <table class="sleep-table">
                    <thead>
                        <tr>
                            <th>Target Pace (min/km)</th>
                            <th>Time to Complete Remaining Distance</th>
                            <th>Sleep Time Remaining</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sleepTableHTML}
                    </tbody>
                </table>
            `;
            
            document.getElementById('statsContainer').innerHTML = html;
        }
        
        async function loadAndDisplayStats() {
            const distance = await fetchCoveredDistance();
            if (distance !== null) {
                
                renderStats(distance);
            } else {
                document.getElementById('statsContainer').innerHTML = `
                    <div class="error">
                        ⚠️ Unable to load distance data from JSONBin backend.
                    </div>
                `;
            }
        }
        
        // Update elapsed time every second
        setInterval(updateElapsedTimeDisplay, 1000);
        
        // Load and display stats every 5 seconds
        setInterval(loadAndDisplayStats, 5000);
        
        // Initial load
        window.addEventListener('load', () => {
            updateElapsedTimeDisplay();
            loadAndDisplayStats();
        });
    </script>
</body>
</html>
